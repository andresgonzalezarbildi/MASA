[build]
  publish = "."

# Permite que el mismo deploy funcione en su dominio propio y también
# proxificado desde https://andresgonzalez.netlify.app/masa
[[redirects]]
  from = "/masa"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/masa/*"
  to = "/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/masa/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"
